<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KingTracker Item</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
    margin:40px;
}

.card{
    max-width:700px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h1{
    color:#0057b8;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.label{
    font-weight:bold;
    width:220px;
}
</style>

</head>

<body>

<div class="card">

<h1>KingTracker Inventory</h1>

<div id="result">
Loading...
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch("data/computer_inventory.json?"+Date.now())
.then(r=>r.json())
.then(data=>{

    const item=data.find(x=>
        x["Item ID"]==id ||
        x["Asset Tag"]==id ||
        x["Inventory ID"]==id
    );

    if(!item){
        document.getElementById("result").innerHTML="<h2>Item not found.</h2>";
        return;
    }

    let html="<table>";

    for(const key in item){
        html+="<tr>";
        html+="<td class='label'>"+key+"</td>";
        html+="<td>"+item[key]+"</td>";
        html+="</tr>";
    }

    html+="</table>";

    document.getElementById("result").innerHTML=html;

});

</script>

</body>
</html>
